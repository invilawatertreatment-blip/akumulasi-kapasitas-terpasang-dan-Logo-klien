<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Kapasitas & Mitra Strategis</title>
    <style>
        :root {
            --bg-dark: #0b1426;
            --card-bg: #111b33;
            --accent-blue: #3b82f6;
            --text-gray: #94a3b8;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f8fafc;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 40px;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1100px;
        }

        /* --- Style Bagian Akumulasi --- */
        .stats-card {
            background-color: var(--bg-dark);
            color: white;
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        .stats-header {
            display: flex;
            align-items: center;
            margin-bottom: 30px;
        }

        .stats-icon {
            background-color: #1e4ed8;
            padding: 12px;
            border-radius: 12px;
            margin-right: 20px;
            display: flex;
            align-items: center;
        }

        .stats-title h2 {
            margin: 0;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .stats-title p {
            margin: 4px 0 0;
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-top: 1px solid #1e293b;
            padding-top: 30px;
            gap: 40px;
        }

        .stat-item:last-child {
            border-left: 1px solid #1e293b;
            padding-left: 40px;
        }

        .stat-label {
            color: var(--accent-blue);
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .stat-value {
            font-size: 3rem;
            font-weight: 700;
            margin: 0;
        }

        .stat-unit {
            font-size: 1.25rem;
            color: var(--text-gray);
            font-weight: 400;
        }

        /* --- Style Bagian Logo --- */
        .partner-section {
            background-color: var(--bg-dark);
            padding: 60px 40px;
            border-radius: 24px;
            text-align: center;
            width: 100%;
        }

        .partner-section h3 {
            color: white;
            font-size: 0.9rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 50px;
            opacity: 0.8;
        }

        .logo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
        }

        .logo-item {
            background-color: white;
            height: 120px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            transition: transform 0.3s ease;
        }

        .logo-item:hover {
            transform: translateY(-5px);
        }

        .logo-item img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .stat-item:last-child { border-left: none; padding-left: 0; }
            .stat-value { font-size: 2.2rem; }
            .logo-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<div class="container">
    <section class="stats-card">
        <div class="stats-header">
            <div class="stats-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 6c.6.5 1.2 1 2.5 1C5.8 7 6.5 6 8 6s2.2 1 3.5 1c1.3 0 2-1 3.5-1s2.2 1 3.5 1c1.3 0 2.5-.5 2.5-.5"></path>
                    <path d="M2 12c.6.5 1.2 1 2.5 1 1.3 0 2-1 3.5-1s2.2 1 3.5 1c1.3 0 2-1 3.5-1s2.2 1 3.5 1c1.3 0 2.5-.5 2.5-.5"></path>
                    <path d="M2 18c.6.5 1.2 1 2.5 1 1.3 0 2-1 3.5-1s2.2 1 3.5 1c1.3 0 2-1 3.5-1s2.2 1 3.5 1c1.3 0 2.5-.5 2.5-.5"></path>
                </svg>
            </div>
            <div class="stats-title">
                <h2>Akumulasi Kapasitas Terpasang</h2>
                <p>Rekam jejak operasional di seluruh Indonesia sejak 2013</p>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-label">Kapasitas Per Bulan</div>
                <p class="stat-value">6.500.700 <span class="stat-unit">m³</span></p>
            </div>
            <div class="stat-item">
                <div class="stat-label">Kapasitas Per Tahun</div>
                <p class="stat-value">78.008.400 <span class="stat-unit">m³</span></p>
            </div>
        </div>
    </section>

    <section class="partner-section">
        <h3>Mitra Industri Strategis</h3>
        <div class="logo-grid">
            <div class="logo-item"><img src="cemerlang-samudra-kontrindo.png" alt="Cemerlang Samudra"></div>
            <div class="logo-item"><img src="kievit.png" alt="Kievit"></div>
            <div class="logo-item"><img src="kiw.png" alt="KIW"></div>
            <div class="logo-item"><img src="patria-maritim-perkasa.png" alt="Patria Maritim"></div>
            <div class="logo-item"><img src="petrokimia-gresik.png" alt="Petrokimia Gresik"></div>
            <div class="logo-item"><img src="tirta-asasta-depok.png" alt="Tirta Asasta"></div>
            <div class="logo-item"><img src="tirtanadi.png" alt="Tirtanadi"></div>
            <div class="logo-item"><img src="united-tractors.png" alt="United Tractors"></div>
            <div class="logo-item"><img src="wika.png" alt="Wika"></div>
        </div>
    </section>
</div>

</body>
</html>
