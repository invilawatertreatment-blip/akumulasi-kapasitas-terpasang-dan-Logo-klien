<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Invila™ | Project Capacity Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            /* Mengizinkan scroll manual sepenuhnya */
            overflow-y: auto; 
            touch-action: pan-y;
        }

        .project-card {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(51, 65, 85, 0.5);
        }

        .hero-gradient {
            background: radial-gradient(circle at top right, rgba(37, 99, 235, 0.12), transparent),
                        radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.08), transparent);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #020617; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="antialiased custom-scrollbar">

    <nav class="sticky top-0 z-50 bg-slate-950/90 backdrop-blur-md border-b border-slate-800/50 px-4 py-2 md:py-3">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="flex flex-col leading-tight">
                    <span class="text-sm md:text-xl font-extrabold tracking-tighter text-white uppercase">Invila<span class="text-blue-500">™</span></span>
                    <span class="text-[6px] md:text-[9px] font-black text-slate-500 uppercase tracking-[0.2em]">Water Technology Ecosystem</span>
                </div>
            </div>
            
            <button onclick="window.history.back()" class="flex items-center space-x-2 bg-slate-800 hover:bg-slate-700 text-white px-3 py-1.5 rounded-full text-[10px] font-bold uppercase transition-all">
                <i data-lucide="arrow-left" class="w-3 h-3"></i>
                <span>Kembali</span>
            </button>
        </div>
    </nav>

    <section class="hero-section hero-gradient py-6 md:py-20 px-4 text-center border-b border-slate-900 flex flex-col justify-center min-h-[60vh]">
        <div class="max-w-5xl mx-auto w-full">
            <div class="inline-flex items-center space-x-2 bg-blue-500/10 border border-blue-500/20 px-2.5 py-1 rounded-full mb-6">
                <i data-lucide="shield-check" class="w-3 h-3 text-blue-500"></i>
                <span class="text-[8px] md:text-[10px] font-black uppercase tracking-[0.2em] text-blue-400">Verified Capacity</span>
            </div>
            
            <h1 class="text-xl md:text-5xl font-black text-white mb-6 tracking-tight uppercase leading-tight">
                Total Akumulasi Kapasitas <br> Pengolahan Terpasang
            </h1>
            
            <div class="flex flex-col items-center justify-center mb-10">
                <div class="flex items-baseline justify-center gap-2">
                    <span class="text-5xl md:text-8xl font-black text-white tabular-nums odometer" data-target="79154776">0</span>
                    <span class="text-xl md:text-4xl font-bold text-blue-500">m³/Thn</span>
                </div>
                <p class="mt-4 text-[10px] md:text-sm text-slate-400 font-bold uppercase tracking-widest">
                    Setara ± <span class="text-white odometer" data-target="216862" data-decimals="1">0</span> m³/hari
                </p>
            </div>

            <button id="re-animate-btn" class="mx-auto flex items-center space-x-2 bg-blue-600/20 hover:bg-blue-600 border border-blue-500/50 text-blue-400 hover:text-white px-6 py-3 rounded-2xl text-xs font-black uppercase tracking-widest transition-all active:scale-95">
                <i data-lucide="play" class="w-4 h-4"></i>
                <span>Re-Animate Numbers</span>
            </button>
        </div>
    </section>

    <section class="py-12 px-4 max-w-7xl mx-auto">
        <h2 class="text-lg md:text-2xl font-black text-white uppercase mb-8">Project Portfolio</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6" id="project-container"></div>
    </section>

    <script>
        // Data Proyek (Hanya contoh 3 untuk mempersingkat tampilan kode)
        const projectData = [
            { name: "Clarifier 6 PDAM Tirtanadi", client: "PDAM Tirtanadi", cap: 43200, type: "IPA", year: "2014" },
            { name: "WTP PDAM Tirta Asasta", client: "PDAM Depok", cap: 25920, type: "WTP", year: "2016" },
            { name: "SAPM Petro Kimia", client: "PT Petro Kimia", cap: 71971, type: "SAPM", year: "2016" }
        ];

        const container = document.getElementById('project-container');
        projectData.forEach(p => {
            container.innerHTML += `
                <div class="project-card p-6 rounded-2xl">
                    <span class="text-[8px] font-mono text-slate-500">${p.year}</span>
                    <p class="text-[9px] font-black text-blue-400 uppercase mt-1">${p.client}</p>
                    <h3 class="text-base font-bold text-white mb-4 uppercase">${p.name}</h3>
                    <div class="pt-3 border-t border-slate-800">
                        <p class="text-[7px] font-black text-slate-500 uppercase">Kapasitas</p>
                        <span class="text-xl font-black text-white">${p.cap.toLocaleString('id-ID')}</span> <span class="text-[9px] text-slate-500">m³/hari</span>
                    </div>
                </div>`;
        });

        lucide.createIcons();

        // --- Logika Odometer ---
        const animateOdometer = (el) => {
            const target = parseFloat(el.getAttribute('data-target'));
            const duration = 2000;
            const startTime = performance.now();
            const update = (now) => {
                const elapsed = now - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const currentVal = progress * target;
                el.innerText = Math.floor(currentVal).toLocaleString('id-ID');
                if (progress < 1) requestAnimationFrame(update);
            };
            requestAnimationFrame(update);
        };

        // --- Logika Auto Scroll (Hanya Scroll, TANPA Redirect) ---
        let autoScrollActive = true;
        let scrollInterval;

        function startScroll() {
            if (!autoScrollActive) return;
            // Scroll perlahan 1 pixel setiap 30ms
            scrollInterval = setInterval(() => {
                window.scrollBy(0, 1);
                // Jika sudah sampai paling bawah, berhenti
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight) {
                    stopScroll();
                }
            }, 30);
        }

        function stopScroll() {
            autoScrollActive = false;
            clearInterval(scrollInterval);
        }

        // Berhenti jika user menyentuh layar atau scroll manual
        window.addEventListener('wheel', stopScroll);
        window.addEventListener('touchstart', stopScroll);

        window.addEventListener('load', () => {
            document.querySelectorAll('.odometer').forEach(animateOdometer);
            setTimeout(startScroll, 2000); // Mulai scroll setelah 2 detik
        });

        document.getElementById('re-animate-btn').addEventListener('click', () => {
            stopScroll();
            document.querySelectorAll('.odometer').forEach(animateOdometer);
        });
    </script>
</body>
</html>
